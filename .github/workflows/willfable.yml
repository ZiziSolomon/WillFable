name: WillFable

on:
  # No schedule: trigger — GitHub's cron throttles high-frequency jobs (it was
  # slipping to ~90-min gaps). A Cloudflare Worker (see cron-worker/) fires the
  # workflow_dispatch below every 10 minutes reliably instead.
  workflow_dispatch: {}  # triggered by the Cloudflare cron Worker (and manual runs)

# Prevent overlapping runs if one is slow — a late run won't stack on the next.
concurrency:
  group: willfable
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install anthropic

      - name: Run one cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          # Logs to stdout only in Actions (no persistent file needed).
          WILLFABLE_LOG: /dev/null
        run: python willfable.py
